<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>營運管理控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --primary: #2563eb;
            --bg-main: #f1f5f9;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--bg-main);
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(226, 232, 240, 0.8); 
        }

        .tab-active { 
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* 摺疊動畫 */
        .accordion-content { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden; 
        }
        .accordion-content.collapsed { max-height: 0; opacity: 0; }
        .accordion-content.expanded { max-height: 5000px; opacity: 1; }
        
        /* 自定義捲軸 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 行動端調整 */
        @media (max-width: 640px) {
            .mobile-grid { grid-template-columns: 1fr; }
            .mobile-hide { display: none; }
            input, select, button { font-size: 16px !important; } /* 防止 iOS 自動縮放 */
        }

        @keyframes pulse-blue {
            0%, 100% { background-color: #3b82f6; opacity: 1; }
            50% { background-color: #93c5fd; opacity: 0.7; }
        }
        .syncing { animation: pulse-blue 1s infinite; color: white !important; }
        .sync-success { background-color: #10b981 !important; color: white !important; }
        .sync-error { background-color: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen text-slate-800 pb-12">
    <!-- 頂部導航 -->
    <header class="sticky top-0 z-30 bg-slate-900/90 backdrop-blur-md text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-black flex items-center gap-2">
                營運數據
                <span id="syncIndicator" class="text-[10px] px-2 py-0.5 rounded-full bg-slate-700 text-slate-400 transition-colors duration-300">
                    <i data-lucide="cloud" class="w-3 h-3 inline"></i>
                    <span id="syncText" class="ml-1">雲端</span>
                </span>
            </h1>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">當前淨利/損</p>
                    <p class="text-md font-black" id="headerNet">$0</p>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 pt-6 space-y-6">
        <!-- 功能分頁切換 -->
        <nav class="flex p-1.5 bg-slate-200/50 rounded-2xl w-full max-w-md mx-auto border border-slate-200">
            <button onclick="switchTab('management')" id="tab-management" class="flex-1 py-2.5 text-xs font-bold rounded-xl tab-active transition-all">交易錄入</button>
            <button onclick="switchTab('daily')" id="tab-daily" class="flex-1 py-2.5 text-xs font-bold rounded-xl text-slate-500 transition-all">歷史明細</button>
            <button onclick="switchTab('reports')" id="tab-reports" class="flex-1 py-2.5 text-xs font-bold rounded-xl text-slate-500 transition-all">系統設定</button>
        </nav>

        <!-- 交易錄入頁面 -->
        <div id="page-management" class="tab-content space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="glass-card p-4 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-400 mb-1">起始支出</p>
                    <input type="number" id="initialBudget" step="0.01" class="w-full bg-transparent font-black text-lg outline-none" onchange="handleBudgetChange()">
                </div>
                <div class="glass-card p-4 rounded-2xl border-b-4 border-blue-500">
                    <p class="text-[10px] font-bold text-slate-400 mb-1">營業額</p>
                    <p class="text-lg font-black" id="totalRevenue">$0</p>
                </div>
                <div class="glass-card p-4 rounded-2xl border-b-4 border-emerald-500">
                    <p class="text-[10px] font-bold text-slate-400 mb-1">累積毛利</p>
                    <p class="text-lg font-black text-emerald-600" id="totalProfit">$0</p>
                </div>
                <div class="glass-card p-4 rounded-2xl border-b-4 border-indigo-500">
                    <p class="text-[10px] font-bold text-slate-400 mb-1">交易筆數</p>
                    <p class="text-lg font-black" id="transCount">0</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- 左側：錄入表單 -->
                <div class="lg:col-span-5 xl:col-span-4">
                    <div class="glass-card p-6 rounded-3xl shadow-sm border border-blue-100">
                        <h2 class="text-md font-bold mb-6 flex items-center gap-2 border-l-4 border-blue-600 pl-4">新交易錄入</h2>
                        <form id="transactionForm" class="space-y-4">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-500">選擇產品</label>
                                <select id="productSelect" required class="w-full h-12 px-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm appearance-none" onchange="autoFillPrices()"></select>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="space-y-1">
                                    <label class="text-xs font-bold text-slate-500">單價 (HKD)</label>
                                    <input type="number" step="0.01" id="unitPrice" placeholder="0.00" required class="w-full h-12 px-4 border border-slate-200 rounded-xl outline-none text-sm">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-bold text-slate-500">數量</label>
                                    <select id="quantity" required class="w-full h-12 px-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm"></select>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-500">日期</label>
                                <input type="date" id="date" required class="w-full h-12 px-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                            </div>
                            <button type="submit" id="submitBtn" class="w-full bg-blue-600 active:bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg transition-all mt-4 flex justify-center items-center gap-2">
                                <i data-lucide="plus-circle" class="w-5 h-5"></i> 立即錄入
                            </button>
                        </form>
                    </div>
                </div>

                <!-- 右側 -->
                <div class="lg:col-span-7 xl:col-span-8 space-y-6">
                    <div class="glass-card p-5 rounded-3xl shadow-sm">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider">即時庫存狀況</h3>
                        </div>
                        <div id="stockGrid" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
                    </div>

                    <div class="glass-card p-5 rounded-3xl shadow-sm">
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-50">
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider">最近錄入紀錄</h3>
                            <button onclick="switchTab('daily')" class="text-[10px] text-blue-500 font-bold">查看全部</button>
                        </div>
                        <div id="recentTransactions" class="space-y-2 max-h-[400px] overflow-y-auto custom-scrollbar"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 歷史明細 -->
        <div id="page-daily" class="tab-content hidden space-y-4">
            <div id="accordionContainer" class="space-y-3"></div>
            <div id="emptyDaily" class="hidden py-20 text-center text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200">
                尚未有任何數據紀錄
            </div>
        </div>

        <!-- 系統設定 -->
        <div id="page-reports" class="tab-content hidden">
            <div class="glass-card p-6 rounded-3xl shadow-sm">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                    <h2 class="text-lg font-bold border-l-4 border-slate-800 pl-4">產品資料庫</h2>
                    <button onclick="openAddModal()" class="w-full sm:w-auto bg-emerald-500 text-white text-xs font-bold px-6 py-3 rounded-xl flex items-center justify-center gap-2 shadow-md">
                        <i data-lucide="plus" class="w-4 h-4"></i> 新增產品
                    </button>
                </div>
                <div id="productSettingsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Modal 略... -->
    <div id="editModal" class="fixed inset-0 z-50 hidden bg-slate-900/60 flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl p-6 w-full max-w-md">
            <h3 class="text-lg font-bold mb-6" id="modalTitle">產品管理</h3>
            <div class="space-y-4">
                <div id="keyInputGroup" class="hidden"><input type="text" id="editKey" placeholder="產品代號 (如 P5)" class="w-full p-4 bg-slate-50 rounded-xl outline-none border"></div>
                <div><input type="text" id="editName" placeholder="產品名稱" class="w-full p-4 bg-slate-50 rounded-xl outline-none border"></div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="editPrice" placeholder="預設售價" class="w-full p-4 bg-slate-50 rounded-xl outline-none border">
                    <input type="number" id="editCost" placeholder="成本" class="w-full p-4 bg-slate-50 rounded-xl outline-none border">
                </div>
                <input type="number" id="editStock" placeholder="目前庫存" class="w-full p-4 bg-slate-50 rounded-xl outline-none border">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 font-bold rounded-xl">取消</button>
                <button onclick="saveProductAction()" class="flex-1 py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 配置 Google Script URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqAwQj-2MHcMFImO6IbSC7NGL_TEmsSfGoEHj-SvPNsUX-SnirFihFFywRSnOoxBD8ng/exec';

        const defaultSettings = {
            "P1": { name: "P1-磁懸浮", price: 360, cost: 240.2, stock: 10 },
            "P2": { name: "P2-帆布袋", price: 30, cost: 14.2, stock: 50 },
            "P3": { name: "P3-毛巾", price: 15, cost: 5.66, stock: 100 },
            "P4": { name: "P4-鎖匙扣", price: 15, cost: 5, stock: 100 }
        };

        let productData = JSON.parse(localStorage.getItem('product_data')) || defaultSettings;
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let openDates = new Set();
        let currentEditKey = null;
        let isAddingMode = false;

        function init() {
            lucide.createIcons();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            document.getElementById('initialBudget').value = localStorage.getItem('initial_budget') || "3962.74";
            initProductSelect();
            initQuantitySelect();
            render();
        }

        // 同步數據到雲端
        async function syncToCloud(payload) {
            const indicator = document.getElementById('syncIndicator');
            const text = document.getElementById('syncText');
            
            indicator.classList.add('syncing');
            text.textContent = "同步中";

            try {
                // 使用 fetch 發送到 GAS
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                indicator.classList.remove('syncing');
                indicator.classList.add('sync-success');
                text.textContent = "已同步";
                setTimeout(() => {
                    indicator.classList.remove('sync-success');
                    text.textContent = "雲端";
                }, 2000);
            } catch (error) {
                console.error("Sync failed:", error);
                indicator.classList.remove('syncing');
                indicator.classList.add('sync-error');
                text.textContent = "失敗";
            }
        }

        function saveAll() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
            localStorage.setItem('product_data', JSON.stringify(productData));
            localStorage.setItem('initial_budget', document.getElementById('initialBudget').value);
        }

        function initProductSelect() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="" disabled selected>請選擇產品...</option>';
            Object.keys(productData).forEach(key => {
                select.innerHTML += `<option value="${key}">${productData[key].name}</option>`;
            });
        }

        function initQuantitySelect() {
            const qSelect = document.getElementById('quantity');
            qSelect.innerHTML = '';
            for(let i=1; i<=100; i++) qSelect.innerHTML += `<option value="${i}">${i}</option>`;
        }

        function handleBudgetChange() {
            saveAll();
            render();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('text-slate-500');
            });
            document.getElementById(`tab-${id}`).classList.add('tab-active');
            document.getElementById(`tab-${id}`).classList.remove('text-slate-500');
            if(id === 'daily') renderHistoryAccordion();
        }

        function autoFillPrices() {
            const key = document.getElementById('productSelect').value;
            if(productData[key]) document.getElementById('unitPrice').value = productData[key].price;
        }

        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const key = document.getElementById('productSelect').value;
            const qty = parseInt(document.getElementById('quantity').value);
            const price = parseFloat(document.getElementById('unitPrice').value);
            
            const record = {
                id: "TRX-" + Date.now(),
                date: document.getElementById('date').value,
                productKey: key,
                product: productData[key].name, // GAS 使用此欄位
                quantity: qty,
                price: price,
                total: price * qty,
                profit: (price - productData[key].cost) * qty,
                status: 'active', // GAS 使用此欄位
                timestamp: Date.now()
            };

            // 1. 本地更新
            transactions.unshift(record);
            productData[key].stock -= qty;
            saveAll();
            render();
            
            // 2. 雲端同步
            syncToCloud(record);

            this.reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        });

        function deleteTransaction(id) {
            if(!confirm('確定刪除此交易？雲端也將同步刪除。')) return;
            const index = transactions.findIndex(t => t.id === id);
            if(index > -1) {
                const t = transactions[index];
                if(productData[t.productKey]) productData[t.productKey].stock += t.quantity;
                
                // 雲端同步刪除標記
                syncToCloud({ ...t, status: 'del' });

                transactions.splice(index, 1);
                saveAll();
                render();
            }
        }

        function render() {
            let tRev = 0, tProfit = 0;
            transactions.forEach(t => { tRev += t.total; tProfit += t.profit; });
            const budget = parseFloat(document.getElementById('initialBudget').value) || 0;
            const net = tRev - budget;

            document.getElementById('totalRevenue').textContent = `$${tRev.toLocaleString()}`;
            document.getElementById('totalProfit').textContent = `$${tProfit.toLocaleString()}`;
            document.getElementById('transCount').textContent = transactions.length;
            
            const netEl = document.getElementById('headerNet');
            netEl.textContent = `$${net.toLocaleString()}`;
            netEl.className = `text-md font-black ${net < 0 ? 'text-red-400' : 'text-emerald-400'}`;

            document.getElementById('stockGrid').innerHTML = Object.keys(productData).map(key => `
                <div class="bg-white border border-slate-100 p-3 rounded-2xl text-center shadow-sm">
                    <span class="block text-[10px] text-slate-400 font-bold mb-1">${productData[key].name}</span>
                    <span class="block text-lg font-black ${productData[key].stock < 5 ? 'text-red-500' : 'text-slate-800'}">${productData[key].stock}</span>
                </div>
            `).join('');

            document.getElementById('recentTransactions').innerHTML = transactions.slice(0, 8).map(t => `
                <div class="flex items-center justify-between p-4 bg-slate-50/50 rounded-2xl border border-white">
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-slate-800">${t.product}</span>
                        <span class="text-[10px] text-slate-400">${t.date} · ${t.quantity} 件</span>
                    </div>
                    <span class="text-sm font-black text-blue-600">$${t.total.toLocaleString()}</span>
                </div>
            `).join('') || '<div class="text-center py-10 text-xs text-slate-300 italic">暫無近期錄入</div>';

            renderProductSettings();
            lucide.createIcons();
        }

        function toggleDate(date) {
            if(openDates.has(date)) openDates.delete(date);
            else openDates.add(date);
            renderHistoryAccordion();
        }

        function renderHistoryAccordion() {
            const container = document.getElementById('accordionContainer');
            if(transactions.length === 0) {
                container.innerHTML = "";
                document.getElementById('emptyDaily').classList.remove('hidden');
                return;
            }
            document.getElementById('emptyDaily').classList.add('hidden');

            const groups = transactions.reduce((acc, t) => {
                if(!acc[t.date]) acc[t.date] = { items: [], total: 0 };
                acc[t.date].items.push(t);
                acc[t.date].total += t.total;
                return acc;
            }, {});

            const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));

            container.innerHTML = sortedDates.map(date => {
                const isExpanded = openDates.has(date);
                const data = groups[date];
                return `
                    <div class="glass-card rounded-2xl overflow-hidden shadow-sm">
                        <button onclick="toggleDate('${date}')" class="w-full flex items-center justify-between p-4 bg-white">
                            <div class="flex items-center gap-3">
                                <span class="bg-slate-900 text-white text-[10px] font-bold px-2 py-1 rounded-md">${date}</span>
                                <span class="text-xs text-slate-400 font-bold">${data.items.length} 筆</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-black text-slate-700">$${data.total.toLocaleString()}</span>
                                <i data-lucide="chevron-down" class="w-4 h-4 transition-transform ${isExpanded ? 'rotate-180' : ''}"></i>
                            </div>
                        </button>
                        <div class="accordion-content ${isExpanded ? 'expanded' : 'collapsed'} bg-slate-50/30">
                            <div class="p-2 space-y-2">
                                ${data.items.map(t => `
                                    <div class="flex items-center justify-between p-3 bg-white rounded-xl border border-slate-100">
                                        <div class="flex flex-col">
                                            <span class="text-xs font-bold text-slate-700">${t.product}</span>
                                            <span class="text-[10px] text-slate-400">${t.quantity} 件 × $${t.price}</span>
                                        </div>
                                        <div class="flex items-center gap-4">
                                            <span class="text-sm font-black text-blue-600">$${t.total}</span>
                                            <button onclick="deleteTransaction('${t.id}')" class="p-2 text-slate-200 hover:text-red-500 transition">
                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderProductSettings() {
            const list = document.getElementById('productSettingsList');
            if(!list) return;
            list.innerHTML = Object.keys(productData).map(key => `
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center font-black text-xs">${key}</div>
                        <div>
                            <p class="text-xs font-bold text-slate-800">${productData[key].name}</p>
                            <p class="text-[10px] text-slate-400">售價: $${productData[key].price} | 成本: $${productData[key].cost}</p>
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="openEditModal('${key}')" class="p-2 text-slate-400 hover:bg-slate-50 rounded-lg"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                        <button onclick="deleteProduct('${key}')" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.openAddModal = () => {
            isAddingMode = true;
            document.getElementById('modalTitle').textContent = "新增產品項目";
            document.getElementById('keyInputGroup').classList.remove('hidden');
            ['editKey', 'editName', 'editPrice', 'editCost', 'editStock'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.openEditModal = (key) => {
            isAddingMode = false;
            currentEditKey = key;
            const p = productData[key];
            document.getElementById('modalTitle').textContent = "編輯產品資料";
            document.getElementById('keyInputGroup').classList.add('hidden');
            document.getElementById('editName').value = p.name;
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editCost').value = p.cost;
            document.getElementById('editStock').value = p.stock;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('editModal').classList.add('hidden');

        window.saveProductAction = () => {
            const name = document.getElementById('editName').value;
            const price = parseFloat(document.getElementById('editPrice').value) || 0;
            const cost = parseFloat(document.getElementById('editCost').value) || 0;
            const stock = parseInt(document.getElementById('editStock').value) || 0;

            if(isAddingMode) {
                const key = document.getElementById('editKey').value.toUpperCase();
                if(!key || productData[key]) return alert("無效代號");
                productData[key] = { name, price, cost, stock };
            } else {
                productData[currentEditKey] = { name, price, cost, stock };
            }
            saveAll();
            initProductSelect();
            render();
            closeModal();
        };

        window.deleteProduct = (key) => {
            if(confirm(`確定刪除 ${key}？相關紀錄將保留但無法再選擇錄入。`)) {
                delete productData[key];
                saveAll();
                initProductSelect();
                render();
            }
        };

        init();
    </script>
</body>
</html>
