<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易管理系統 - 成本監控版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }
        .tab-active { @apply bg-white text-blue-600 shadow-md; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased p-3 md:p-6 pb-20 md:pb-6">
    <div class="max-w-7xl mx-auto">
        
        <!-- 頂部導覽 -->
        <header class="flex flex-col lg:flex-row justify-between items-stretch lg:items-center mb-8 gap-4">
            <div class="px-2">
                <h1 class="text-2xl md:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    營運管理控制台
                    <span id="syncStatus" class="text-[10px] font-normal bg-slate-100 text-slate-500 px-2 py-1 rounded-full text-nowrap flex items-center gap-1">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> 待命 (已連結)
                    </span>
                </h1>
                <nav class="flex p-1 bg-slate-200/50 rounded-xl w-fit mt-4">
                    <button onclick="switchTab('management')" id="tab-management" class="px-6 py-2 text-sm font-bold rounded-lg transition-all tab-active">交易管理</button>
                    <button onclick="switchTab('reports')" id="tab-reports" class="px-6 py-2 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-700">數據報表</button>
                </nav>
            </div>
            
            <div class="glass-card px-6 py-4 rounded-2xl border-l-4 border-blue-500 flex flex-row items-center justify-between gap-10">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">起始支出/預算 (HKD)</p>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-400 font-bold">$</span>
                        <input type="number" id="initialBudget" step="0.01" class="bg-transparent text-2xl font-black text-slate-800 outline-none w-32 focus:ring-1 focus:ring-blue-100 rounded" value="3962.74" onchange="render()">
                    </div>
                </div>
                <div class="h-10 w-px bg-slate-100"></div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">目前淨損益</p>
                    <p class="text-2xl font-black" id="netProfitDisplay">$0</p>
                </div>
            </div>
        </header>

        <!-- [分頁 1: 交易管理] -->
        <div id="page-management" class="tab-content">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="glass-card p-5 rounded-2xl border-b-4 border-blue-500 text-center md:text-left">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">總營業額</p>
                    <p class="text-2xl font-black text-slate-800" id="totalRevenue">$0</p>
                </div>
                <div class="glass-card p-5 rounded-2xl border-b-4 border-emerald-500 text-center md:text-left">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">累積毛利</p>
                    <p class="text-2xl font-black text-emerald-600" id="totalProfit">$0</p>
                </div>
                <div class="glass-card p-5 rounded-2xl border-b-4 border-indigo-500 col-span-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 flex items-center justify-between">
                        庫存及成本快速監控 
                        <span class="text-[8px] opacity-60">點擊項目修改參數</span>
                    </p>
                    <div id="stockGrid" class="grid grid-cols-4 gap-2 mt-1"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- 左側：輸入表單 -->
                <aside class="lg:col-span-4">
                    <div class="glass-card p-8 rounded-3xl sticky top-6">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2 border-l-4 border-blue-500 pl-4">建立交易單</h2>
                        <form id="transactionForm" class="space-y-5">
                            <div>
                                <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">選擇產品</label>
                                <select id="productSelect" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm appearance-none cursor-pointer" onchange="autoFillPrices()">
                                    <option value="" disabled selected>請選擇項目...</option>
                                </select>
                            </div>

                            <div id="packageField" class="hidden space-y-3 p-4 bg-blue-50/50 rounded-2xl border border-blue-100">
                                <p class="text-[10px] font-bold text-blue-500 uppercase flex items-center gap-2">📦 套裝配置</p>
                                <div id="packageList" class="space-y-2"></div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">成交單價</label>
                                    <input type="number" step="0.01" id="unitPrice" required class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none text-sm">
                                </div>
                                <div>
                                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">數量</label>
                                    <select id="quantity" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" onchange="autoFillPrices()"></select>
                                </div>
                            </div>

                            <div>
                                <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">交易日期</label>
                                <input type="date" id="date" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                            </div>

                            <input type="hidden" id="totalTransactionCost">

                            <button type="submit" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl transition active:scale-95 flex justify-center items-center gap-2 mt-4">
                                <i data-lucide="cloud-upload" class="w-4 h-4"></i> 提交交易
                            </button>
                        </form>
                    </div>
                </aside>

                <!-- 右側：歷史紀錄 -->
                <main class="lg:col-span-8">
                    <div class="glass-card rounded-3xl overflow-hidden h-full flex flex-col">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                            <h2 class="font-bold text-slate-800">歷史交易清單</h2>
                            <span class="text-[10px] text-slate-400 font-bold uppercase" id="recordCount">0 筆紀錄</span>
                        </div>
                        <div class="overflow-x-auto no-scrollbar flex-grow">
                            <table class="w-full text-left min-w-[600px]">
                                <thead class="bg-slate-50/80 sticky top-0 z-10">
                                    <tr class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                                        <th class="px-8 py-4">日期</th>
                                        <th class="px-6 py-4">產品</th>
                                        <th class="px-6 py-4">金額</th>
                                        <th class="px-8 py-4 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="recordList" class="divide-y divide-slate-50 text-sm"></tbody>
                            </table>
                            <div id="emptyState" class="py-32 text-center text-slate-300 hidden">
                                <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                                <p>目前尚無本地交易紀錄</p>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- [分頁 2: 數據報表] -->
        <div id="page-reports" class="tab-content hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <!-- 報表內容同上個版本，此處省略重複結構但邏輯保持一致 -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass-card p-6 rounded-3xl">
                        <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 flex items-center gap-2">
                            <i data-lucide="trophy" class="w-4 h-4 text-amber-500"></i> 熱銷排行 (數量)
                        </h3>
                        <div id="topProductsList" class="space-y-4"></div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl bg-blue-600 text-white">
                        <h3 class="text-xs font-bold uppercase opacity-80 mb-1">平均每單成交額</h3>
                        <p class="text-3xl font-black mb-4" id="avgOrderValue">$0</p>
                        <div class="h-px bg-white/20 mb-4"></div>
                        <h3 class="text-xs font-bold uppercase opacity-80 mb-1">毛利率估計</h3>
                        <p class="text-3xl font-black" id="marginRate">0%</p>
                    </div>
                </div>
                <div class="lg:col-span-8 grid grid-cols-1 gap-6">
                    <div class="glass-card p-6 rounded-3xl">
                        <h3 class="text-sm font-bold text-slate-400 uppercase mb-6 flex items-center gap-2">
                            <i data-lucide="trending-up" class="w-4 h-4 text-blue-500"></i> 每日營業額趨勢
                        </h3>
                        <div class="chart-container"><canvas id="trendChart"></canvas></div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl">
                        <h3 class="text-sm font-bold text-slate-400 uppercase mb-6 flex items-center gap-2">
                            <i data-lucide="pie-chart" class="w-4 h-4 text-indigo-500"></i> 產品營收組成比
                        </h3>
                        <div class="chart-container"><canvas id="pieChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 編輯彈窗：加入預設成本修改 -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50 p-6">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-1 text-slate-800">產品參數調整</h3>
            <p class="text-xs text-slate-400 mb-8" id="targetProductName"></p>
            <div class="space-y-5 mb-8">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">目前庫存數量</label>
                    <input type="number" id="editStockCount" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-xl font-black text-center outline-none focus:ring-2 focus:ring-blue-100">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">預設單個成本</label>
                        <input type="number" step="0.01" id="editUnitCost" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-lg font-bold text-center text-emerald-600 outline-none focus:ring-2 focus:ring-emerald-100">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">預設單個售價</label>
                        <input type="number" step="0.01" id="editUnitPrice" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-lg font-bold text-center text-blue-600 outline-none focus:ring-2 focus:ring-blue-100">
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeEditModal()" class="py-4 font-bold text-slate-400 hover:text-slate-600">取消</button>
                <button onclick="confirmEditChange()" class="py-4 font-bold bg-blue-600 text-white rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition">儲存更新</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqAwQj-2MHcMFImO6IbSC7NGL_TEmsSfGoEHj-SvPNsUX-SnirFihFFywRSnOoxBD8ng/exec';
        
        const DEFAULT_PRODUCT_DB = {
            "P1-磁懸浮": { price: 360, cost: 240.2 },
            "P2-帆布袋": { price: 30, cost: 14.2 },
            "P3-毛巾": { price: 15, cost: 5.66 },
            "P4-鎖匙扣": { price: 15, cost: 5 }
        };

        let productSettings = JSON.parse(localStorage.getItem('product_settings')) || DEFAULT_PRODUCT_DB;
        let stocks = JSON.parse(localStorage.getItem('stocks')) || { "P1-磁懸浮": 10, "P2-帆布袋": 50, "P3-毛巾": 100, "P4-鎖匙扣": 100 };
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let currentEditingKey = null;

        let trendChartObj = null;
        let pieChartObj = null;

        function init() {
            lucide.createIcons();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            const qtySelect = document.getElementById('quantity');
            for(let i=1; i<=50; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = i; qtySelect.appendChild(opt);
            }
            initProductSelect();
            initPackageList();
            render();
        }

        function initProductSelect() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="" disabled selected>請選擇項目...</option>';
            Object.keys(productSettings).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key; opt.textContent = `${key} (剩: ${stocks[key]})`;
                select.appendChild(opt);
            });
            select.innerHTML += `<option value="package" class="text-blue-600 font-bold">📦 套裝組合包</option>`;
        }

        function initPackageList() {
            const container = document.getElementById('packageList');
            container.innerHTML = Object.keys(productSettings).map(key => `
                <div class="flex items-center justify-between text-xs py-1">
                    <span class="text-slate-600">${key}</span>
                    <div class="flex items-center bg-white rounded-lg border border-blue-200">
                        <button type="button" onclick="stepPkg('${key}', -1)" class="px-2 py-1 text-blue-500">-</button>
                        <input type="number" data-pkg-key="${key}" value="0" readonly class="pkg-input w-8 text-center font-bold text-blue-700 outline-none bg-transparent">
                        <button type="button" onclick="stepPkg('${key}', 1)" class="px-2 py-1 text-blue-500">+</button>
                    </div>
                </div>
            `).join('');
        }

        window.stepPkg = (key, step) => {
            const input = document.querySelector(`input[data-pkg-key="${key}"]`);
            input.value = Math.max(0, parseInt(input.value) + step);
            calculatePackageTotal();
        };

        function calculatePackageTotal() {
            let totalP = 0, totalC = 0;
            document.querySelectorAll('.pkg-input').forEach(input => {
                const key = input.dataset.pkgKey;
                const qty = parseInt(input.value) || 0;
                totalP += productSettings[key].price * qty;
                totalC += productSettings[key].cost * qty;
            });
            document.getElementById('unitPrice').value = totalP.toFixed(2);
            document.getElementById('totalTransactionCost').value = totalC.toFixed(2);
        }

        window.autoFillPrices = () => {
            const productType = document.getElementById('productSelect').value;
            const qty = parseInt(document.getElementById('quantity').value) || 1;
            const pkgField = document.getElementById('packageField');
            if (productType === 'package') {
                pkgField.classList.remove('hidden');
                calculatePackageTotal();
            } else if (productSettings[productType]) {
                pkgField.classList.add('hidden');
                document.getElementById('unitPrice').value = productSettings[productType].price;
                document.getElementById('totalTransactionCost').value = (productSettings[productType].cost * qty).toFixed(2);
            }
        };

        async function syncToCloud(payload) {
            const statusEl = document.getElementById('syncStatus');
            statusEl.innerHTML = `<i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> 同步中...`;
            statusEl.className = "text-[10px] font-normal bg-blue-100 text-blue-600 px-2 py-1 rounded-full text-nowrap flex items-center gap-1";
            lucide.createIcons();

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                statusEl.innerHTML = `<i data-lucide="check-circle" class="w-3 h-3"></i> 雲端同步成功`;
                statusEl.className = "text-[10px] font-normal bg-green-100 text-green-600 px-2 py-1 rounded-full text-nowrap flex items-center gap-1";
            } catch (err) {
                statusEl.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3"></i> 同步失敗`;
                statusEl.className = "text-[10px] font-normal bg-red-100 text-red-600 px-2 py-1 rounded-full text-nowrap flex items-center gap-1";
            }
            lucide.createIcons();
        }

        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const productType = document.getElementById('productSelect').value;
            let finalName = "", rawMapping = {};
            const qtySelection = parseInt(document.getElementById('quantity').value);

            if (productType === 'package') {
                const items = [];
                document.querySelectorAll('.pkg-input').forEach(input => {
                    const q = parseInt(input.value) || 0;
                    if (q > 0) { 
                        items.push(`${input.dataset.pkgKey.split('-')[0]}x${q}`); 
                        rawMapping[input.dataset.pkgKey] = q; 
                    }
                });
                finalName = "📦 套裝: " + items.join(', ');
            } else {
                finalName = productType; 
                rawMapping[productType] = qtySelection;
            }

            const unitPrice = parseFloat(document.getElementById('unitPrice').value);
            const totalRev = unitPrice * (productType === 'package' ? 1 : qtySelection);
            const totalCost = parseFloat(document.getElementById('totalTransactionCost').value);

            const record = {
                id: "T-" + Date.now(),
                date: document.getElementById('date').value,
                product: finalName,
                quantity: productType === 'package' ? 1 : qtySelection,
                price: unitPrice,
                total: totalRev,
                status: 'active'
            };

            Object.keys(rawMapping).forEach(key => stocks[key] -= rawMapping[key]);
            const localRecord = { ...record, totalCost, profit: totalRev - totalCost, rawMapping };
            transactions.unshift(localRecord);
            saveAndRender();
            syncToCloud(record);

            this.reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            initProductSelect(); initPackageList();
        });

        window.deleteRecord = (id) => {
            const record = transactions.find(t => t.id === id);
            if(!record || !confirm('確認移除此交易？')) return;
            if (record.rawMapping) {
                Object.keys(record.rawMapping).forEach(k => stocks[k] += record.rawMapping[k]);
            }
            syncToCloud({ id: record.id, date: record.date, status: 'del' });
            transactions = transactions.filter(t => t.id !== id);
            saveAndRender();
            initProductSelect();
        };

        function render() {
            renderStocks();
            const list = document.getElementById('recordList');
            const empty = document.getElementById('emptyState');
            list.innerHTML = '';
            
            let tRev = 0, tProfit = 0;
            transactions.forEach(item => {
                tRev += item.total; tProfit += item.profit;
                list.innerHTML += `
                    <tr>
                        <td class="px-8 py-5 text-slate-400 font-bold text-[10px]">${item.date}</td>
                        <td class="px-6 py-5 font-bold">${item.product} <span class="text-[10px] text-slate-400">x${item.quantity}</span></td>
                        <td class="px-6 py-5 text-blue-600 font-bold">$${item.total.toLocaleString()}</td>
                        <td class="px-8 py-5 text-center">
                            <button onclick="deleteRecord('${item.id}')" class="text-slate-300 hover:text-red-400 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('recordCount').textContent = `${transactions.length} 筆`;
            empty.classList.toggle('hidden', transactions.length > 0);
            document.getElementById('totalRevenue').textContent = `$${tRev.toLocaleString()}`;
            document.getElementById('totalProfit').textContent = `$${tProfit.toLocaleString()}`;
            
            const budget = parseFloat(document.getElementById('initialBudget').value) || 0;
            const net = tRev - budget;
            const netEl = document.getElementById('netProfitDisplay');
            netEl.textContent = `$${net.toLocaleString()}`;
            netEl.className = `text-2xl font-black ${net < 0 ? 'text-red-500' : 'text-emerald-600'}`;
            
            lucide.createIcons();
            if(!document.getElementById('page-reports').classList.contains('hidden')) {
                updateReports();
            }
        }

        function renderStocks() {
            const grid = document.getElementById('stockGrid');
            grid.innerHTML = Object.keys(stocks).map(key => `
                <button onclick="openEditModal('${key}')" class="bg-white border p-2 rounded-xl text-center transition hover:border-blue-400 hover:shadow-sm">
                    <span class="block text-[8px] text-slate-400 truncate font-bold">${key.split('-')[0]}</span>
                    <span class="block text-sm font-black text-slate-800">${stocks[key]}</span>
                    <span class="block text-[7px] text-emerald-500 font-bold mt-1">成本: $${productSettings[key].cost}</span>
                </button>
            `).join('');
        }

        window.openEditModal = (key) => {
            currentEditingKey = key;
            document.getElementById('targetProductName').textContent = key;
            document.getElementById('editStockCount').value = stocks[key];
            document.getElementById('editUnitCost').value = productSettings[key].cost;
            document.getElementById('editUnitPrice').value = productSettings[key].price;
            document.getElementById('editModal').classList.remove('hidden');
        };
        window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');
        window.confirmEditChange = () => {
            stocks[currentEditingKey] = parseInt(document.getElementById('editStockCount').value);
            productSettings[currentEditingKey].cost = parseFloat(document.getElementById('editUnitCost').value);
            productSettings[currentEditingKey].price = parseFloat(document.getElementById('editUnitPrice').value);
            saveAndRender(); closeEditModal(); initProductSelect();
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${id}`).classList.add('tab-active');
            lucide.createIcons();
            if (id === 'reports') updateReports();
        };

        // 報表邏輯
        function updateReports() {
            if (transactions.length === 0) return;
            const productCounts = {};
            transactions.forEach(t => {
                const name = t.product.startsWith('📦') ? '組合套裝' : t.product;
                productCounts[name] = (productCounts[name] || 0) + t.quantity;
            });
            const sorted = Object.entries(productCounts).sort((a,b) => b[1] - a[1]);
            document.getElementById('topProductsList').innerHTML = sorted.slice(0, 5).map(([name, qty], idx) => `
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-500">${idx+1}</span>
                        <span class="text-sm font-medium text-slate-700">${name}</span>
                    </div>
                    <span class="text-sm font-black text-slate-900">${qty}</span>
                </div>
            `).join('');
            const totalRev = transactions.reduce((s, t) => s + t.total, 0);
            const totalProfit = transactions.reduce((s, t) => s + t.profit, 0);
            document.getElementById('avgOrderValue').textContent = `$${(totalRev / transactions.length || 0).toFixed(0)}`;
            document.getElementById('marginRate').textContent = `${((totalProfit / totalRev) * 100 || 0).toFixed(1)}%`;
            
            const dailyData = {};
            transactions.forEach(t => { dailyData[t.date] = (dailyData[t.date] || 0) + t.total; });
            const dates = Object.keys(dailyData).sort();
            const totals = dates.map(d => dailyData[d]);
            
            const pieData = {};
            transactions.forEach(t => {
                const name = t.product.startsWith('📦') ? '組合套裝' : t.product;
                pieData[name] = (pieData[name] || 0) + t.total;
            });
            initCharts(dates, totals, Object.keys(pieData), Object.values(pieData));
        }

        function initCharts(dates, totals, productLabels, productTotals) {
            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            if (trendChartObj) trendChartObj.destroy();
            trendChartObj = new Chart(ctxTrend, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '營業額',
                        data: totals,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (pieChartObj) pieChartObj.destroy();
            pieChartObj = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: productLabels,
                    datasets: [{
                        data: productTotals,
                        backgroundColor: ['#3b82f6', '#818cf8', '#fbbf24', '#34d399', '#f87171']
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 6, font: { size: 10 } } } },
                    cutout: '70%'
                }
            });
        }

        function saveAndRender() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
            localStorage.setItem('stocks', JSON.stringify(stocks));
            localStorage.setItem('product_settings', JSON.stringify(productSettings));
            render();
        }

        init();
    </script>
</body>
</html>
