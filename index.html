<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>營運管理控制台 Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root { 
            --primary: #3b82f6; 
            --success: #10b981;
            --warning: #f59e0b;
            --bg-main: #f1f5f9; 
        }

        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background: var(--bg-main); 
            -webkit-tap-highlight-color: transparent; 
            color: #1e293b;
        }

        .stat-card-premium {
            position: relative;
            overflow: hidden;
            background: white;
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .stat-card-premium:active {
            transform: scale(0.97);
        }

        .gradient-blue { background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); }
        .gradient-emerald { background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); }
        .gradient-amber { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }

        .glass-header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }

        .tab-active { 
            background: white; 
            color: var(--primary); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-24">
    <!-- Header -->
    <header class="sticky top-0 z-50 glass-header text-white p-4 shadow-xl border-b border-slate-700">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/20">
                        <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    </div>
                    <h1 class="text-lg font-black tracking-tight">經營控制台 <span class="text-blue-400">PRO</span></h1>
                </div>
                <div id="syncStatusBox" class="flex items-center mt-1.5 px-2.5 py-1 rounded-full bg-slate-800/50 border border-slate-700 w-fit">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-emerald-500 mr-2 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span>
                    <span id="syncText" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">系統連線中</span>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">當前預算後淨利</p>
                <p class="text-2xl font-black tabular-nums" id="headerNet">$0</p>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 pt-8 space-y-8">
        
        <!-- Dashboard Section: Beautiful Stats -->
        <section id="dashboard" class="space-y-4">
            <div class="flex items-center justify-between px-1">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em]">今日營運實時看板</h2>
                <span id="displayDate" class="text-[11px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">2024-05-20</span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Revenue Card -->
                <div class="stat-card-premium p-6 gradient-blue shadow-blue-100/50 shadow-xl border-blue-100">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2.5 bg-blue-500/10 rounded-xl text-blue-600">
                            <i data-lucide="banknote" class="w-6 h-6"></i>
                        </div>
                        <span class="text-[10px] font-bold text-blue-500 bg-blue-100/50 px-2 py-1 rounded-md">REVENUE</span>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-500 mb-1">今日總營業額</p>
                        <div class="flex items-baseline gap-1">
                            <span class="text-3xl font-black text-slate-800 tabular-nums" id="dashRev">$0</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase">hkd</span>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-blue-200/50 flex justify-between items-center">
                        <div class="flex items-center gap-1 text-emerald-600 text-[11px] font-bold">
                            <i data-lucide="trending-up" class="w-3 h-3"></i> 正常增長
                        </div>
                        <div class="w-20 h-1.5 bg-blue-200 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500 w-3/4"></div>
                        </div>
                    </div>
                </div>

                <!-- Profit Card -->
                <div class="stat-card-premium p-6 gradient-emerald shadow-emerald-100/50 shadow-xl border-emerald-100">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2.5 bg-emerald-500/10 rounded-xl text-emerald-600">
                            <i data-lucide="coins" class="w-6 h-6"></i>
                        </div>
                        <span class="text-[10px] font-bold text-emerald-500 bg-emerald-100/50 px-2 py-1 rounded-md">PROFIT</span>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-500 mb-1">今日預估毛利</p>
                        <div class="flex items-baseline gap-1">
                            <span class="text-3xl font-black text-emerald-700 tabular-nums" id="dashProfit">$0</span>
                            <span id="dashMargin" class="text-[10px] text-emerald-500 font-black bg-emerald-100 px-1.5 rounded ml-1">0%</span>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-emerald-200/50">
                        <p class="text-[10px] font-bold text-emerald-600/70">毛利隨成交單價實時浮動</p>
                    </div>
                </div>

                <!-- Tx Count Card -->
                <div class="stat-card-premium p-6 gradient-amber shadow-amber-100/50 shadow-xl border-amber-100">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2.5 bg-amber-500/10 rounded-xl text-amber-600">
                            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                        </div>
                        <span class="text-[10px] font-bold text-amber-500 bg-amber-100/50 px-2 py-1 rounded-md">COUNT</span>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-500 mb-1">今日成交筆數</p>
                        <div class="flex items-baseline gap-1">
                            <span class="text-3xl font-black text-amber-900 tabular-nums" id="dashCount">0</span>
                            <span class="text-[10px] text-amber-500 font-bold uppercase">transactions</span>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-amber-200/50 flex items-center justify-between">
                         <div id="txDotContainer" class="flex -space-x-1.5">
                            <div class="w-5 h-5 rounded-full border-2 border-amber-50 bg-amber-200"></div>
                            <div class="w-5 h-5 rounded-full border-2 border-amber-50 bg-amber-300"></div>
                         </div>
                         <p class="text-[10px] font-black text-amber-700 uppercase">穩定交易中</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Navigation -->
        <nav class="flex p-1.5 bg-white/60 backdrop-blur border border-white rounded-2xl max-w-sm mx-auto shadow-sm sticky top-24 z-40">
            <button onclick="switchTab('input')" id="tab-input" class="flex-1 py-2.5 text-xs font-black rounded-xl tab-active transition-all">交易錄入</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2.5 text-xs font-black rounded-xl text-slate-400 transition-all">歷史明細</button>
            <button onclick="switchTab('config')" id="tab-config" class="flex-1 py-2.5 text-xs font-black rounded-xl text-slate-400 transition-all">系統設定</button>
        </nav>

        <!-- Page 1: Input -->
        <div id="page-input" class="tab-content space-y-8 animate-in fade-in duration-500">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Form Card -->
                <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -z-0 opacity-50"></div>
                    
                    <h2 class="text-sm font-black text-slate-800 mb-6 flex items-center gap-3 relative z-10">
                        <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                        快速錄入交易
                    </h2>
                    
                    <form id="txForm" class="space-y-6 relative z-10">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1 flex justify-between">
                                <span>交易日期</span>
                                <span class="text-blue-500 lowercase">date picker</span>
                            </label>
                            <input type="date" id="txDate" required onchange="render()" class="w-full h-14 px-5 bg-slate-50 border border-slate-200 rounded-2xl font-bold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all">
                        </div>
                        
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">選擇錄入產品</label>
                            <select id="prodSelect" required class="w-full h-14 px-5 bg-slate-50 border border-slate-200 rounded-2xl font-bold focus:ring-4 focus:ring-blue-500/10 outline-none appearance-none" onchange="autoPrice()"></select>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-5">
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">成交單價 (HKD)</label>
                                <input type="number" step="0.01" id="prodPrice" required class="w-full h-14 px-5 border border-slate-200 rounded-2xl font-black focus:ring-4 focus:ring-blue-500/10 outline-none">
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">數量</label>
                                <input type="number" id="prodQty" value="1" min="1" required class="w-full h-14 px-5 border border-slate-200 rounded-2xl font-black text-blue-600 focus:ring-4 focus:ring-blue-500/10 outline-none">
                            </div>
                        </div>
                        
                        <button type="submit" class="w-full bg-slate-900 hover:bg-black active:scale-[0.98] text-white font-black py-5 rounded-2xl shadow-xl shadow-slate-200 transition-all flex justify-center items-center gap-3 mt-4">
                            <i data-lucide="send" class="w-5 h-5"></i> 提交此筆交易
                        </button>
                    </form>
                </div>

                <!-- Stock Card -->
                <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100">
                    <h2 class="text-sm font-black text-slate-800 mb-6 flex items-center gap-3">
                        <span class="w-1.5 h-6 bg-emerald-500 rounded-full"></span>
                        當前剩餘庫存
                    </h2>
                    <div id="stockGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="space-y-4">
                <div class="flex items-center justify-between px-1">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">最新交易動態</h3>
                    <span class="text-[10px] text-slate-400 font-bold uppercase">last 5 items</span>
                </div>
                <div class="bg-white rounded-[1.5rem] border border-slate-100 overflow-hidden shadow-sm">
                    <div id="recentList" class="divide-y divide-slate-50 max-h-[320px] overflow-y-auto custom-scroll"></div>
                </div>
            </div>
        </div>

        <!-- Page 2: History -->
        <div id="page-history" class="tab-content hidden animate-in slide-in-from-right duration-500 space-y-4">
            <div id="historyAccordion" class="space-y-4"></div>
        </div>

        <!-- Page 3: Config -->
        <div id="page-config" class="tab-content hidden animate-in slide-in-from-right duration-500 space-y-8">
            <div class="bg-white p-8 rounded-[2rem] border-t-4 border-slate-900 shadow-sm">
                <h2 class="font-black text-sm mb-6 flex items-center gap-2">
                    <i data-lucide="settings" class="w-4 h-4"></i> 營運基礎預算 (Budget)
                </h2>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">設定初始投資總成本 (HKD)</label>
                    <input type="number" id="initialBudget" class="w-full h-14 px-5 bg-slate-50 border border-slate-200 rounded-2xl font-black text-slate-800" onchange="saveConfig()">
                </div>
                <p class="text-[10px] text-slate-400 mt-3 font-medium italic">此金額將作為計算「淨利」的基準點。</p>
            </div>

            <div class="bg-white p-8 rounded-[2rem] shadow-sm">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="font-black text-sm">產品定義管理</h2>
                    <button onclick="openProdModal()" class="bg-blue-600 text-white text-[10px] px-5 py-2.5 rounded-xl font-black hover:bg-blue-700 flex items-center gap-2 shadow-lg shadow-blue-200">
                        <i data-lucide="plus" class="w-4 h-4"></i> 新增品項
                    </button>
                </div>
                <div id="prodManagementList" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>
        </div>
    </div>

    <!-- Modal for Product Edit -->
    <div id="prodModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden animate-in zoom-in duration-300">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                <h3 id="modalTitle" class="font-black text-slate-800 text-xl tracking-tight">編輯產品</h3>
                <button onclick="closeProdModal()" class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-900 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="prodForm" class="p-8 space-y-6">
                <input type="hidden" id="editProdKey">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">產品名稱</label>
                    <input type="text" id="editProdName" required class="w-full h-14 px-5 bg-slate-50 border border-slate-200 rounded-2xl font-bold focus:ring-4 focus:ring-blue-500/10 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">預設售價</label>
                        <input type="number" step="0.01" id="editProdPrice" required class="w-full h-14 px-5 bg-slate-50 border border-slate-200 rounded-2xl font-black">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">單位進貨成本</label>
                        <input type="number" step="0.01" id="editProdCost" required class="w-full h-14 px-5 bg-slate-50 border border-slate-200 rounded-2xl font-black">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">初始庫存量</label>
                    <input type="number" id="editProdStock" required class="w-full h-14 px-5 bg-slate-50 border border-slate-200 rounded-2xl font-black">
                </div>
                <button type="submit" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-100 mt-4 active:scale-95 transition-all">
                    儲存變更並更新
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwqAwQj-2MHcMFImO6IbSC7NGL_TEmsSfGoEHj-SvPNsUX-SnirFihFFywRSnOoxBD8ng/exec';
        
        let db = {
            prods: JSON.parse(localStorage.getItem('pro_prods_v2')) || {
                "P1": { name: "磁懸浮藝術品", price: 360, cost: 240.2, stock: 10 },
                "P2": { name: "原創設計帆布袋", price: 30, cost: 14.2, stock: 50 }
            },
            txs: JSON.parse(localStorage.getItem('pro_txs_v2')) || [],
            queue: JSON.parse(localStorage.getItem('pro_queue_v2')) || [],
            budget: localStorage.getItem('pro_budget_v2') || "3962.74"
        };

        let isSyncing = false;

        function init() {
            lucide.createIcons();
            document.getElementById('initialBudget').value = db.budget;
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('txDate').value = today;
            
            updateProdSelect();
            render();
            setInterval(autoSync, 30000);
        }

        function saveDB() {
            localStorage.setItem('pro_prods_v2', JSON.stringify(db.prods));
            localStorage.setItem('pro_txs_v2', JSON.stringify(db.txs));
            localStorage.setItem('pro_queue_v2', JSON.stringify(db.queue));
            localStorage.setItem('pro_budget_v2', db.budget);
        }

        function updateProdSelect() {
            const s = document.getElementById('prodSelect');
            s.innerHTML = '<option value="" disabled selected>請選擇...</option>';
            Object.keys(db.prods).forEach(k => {
                s.innerHTML += `<option value="${k}">${db.prods[k].name}</option>`;
            });
        }

        function autoPrice() {
            const k = document.getElementById('prodSelect').value;
            if(db.prods[k]) document.getElementById('prodPrice').value = db.prods[k].price;
        }

        document.getElementById('txForm').onsubmit = (e) => {
            e.preventDefault();
            const k = document.getElementById('prodSelect').value;
            const q = parseInt(document.getElementById('prodQty').value);
            const p = parseFloat(document.getElementById('prodPrice').value);
            const d = document.getElementById('txDate').value;
            
            const record = {
                id: "T" + Date.now(),
                date: d,
                product: db.prods[k].name,
                productKey: k,
                qty: q,
                price: p,
                total: p * q,
                profit: (p - db.prods[k].cost) * q,
                type: 'RECORD'
            };

            db.txs.unshift(record);
            db.prods[k].stock -= q;
            db.queue.push(record);
            
            saveDB();
            render();
            autoSync();
            
            const currentSelectedDate = document.getElementById('txDate').value;
            e.target.reset();
            document.getElementById('txDate').value = currentSelectedDate;
            updateProdSelect();
        };

        function render() {
            const selectedDate = document.getElementById('txDate').value;
            document.getElementById('displayDate').textContent = selectedDate;

            let totalRev = 0;
            let dayRev = 0;
            let dayProfit = 0;
            let dayCount = 0;

            db.txs.forEach(t => {
                totalRev += t.total;
                if(t.date === selectedDate) {
                    dayRev += t.total;
                    dayProfit += t.profit;
                    dayCount++;
                }
            });

            const netTotal = totalRev - parseFloat(db.budget || 0);

            // Update Header Net
            document.getElementById('headerNet').textContent = `$${netTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('headerNet').className = `text-2xl font-black tabular-nums ${netTotal >= 0 ? 'text-emerald-400' : 'text-red-400'}`;

            // Update Dashboard Stats
            document.getElementById('dashRev').textContent = `$${dayRev.toLocaleString()}`;
            document.getElementById('dashProfit').textContent = `$${dayProfit.toLocaleString()}`;
            document.getElementById('dashCount').textContent = dayCount;
            
            const margin = dayRev > 0 ? ((dayProfit / dayRev) * 100).toFixed(0) : 0;
            document.getElementById('dashMargin').textContent = `${margin}%`;

            // Stock Grid
            document.getElementById('stockGrid').innerHTML = Object.keys(db.prods).map(k => `
                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 hover:border-blue-200 transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[10px] font-black text-slate-400 uppercase truncate pr-2">${db.prods[k].name}</p>
                        <i data-lucide="package" class="w-3 h-3 text-slate-300"></i>
                    </div>
                    <div class="flex items-baseline gap-1.5">
                        <span class="text-2xl font-black ${db.prods[k].stock <= 5 ? 'text-red-500' : 'text-slate-800'}">${db.prods[k].stock}</span>
                        <span class="text-[10px] text-slate-400 font-black uppercase">qty</span>
                    </div>
                    <div class="w-full h-1 bg-slate-200 rounded-full mt-3 overflow-hidden">
                        <div class="h-full ${db.prods[k].stock <= 5 ? 'bg-red-500' : 'bg-emerald-500'}" style="width: ${Math.min(db.prods[k].stock * 2, 100)}%"></div>
                    </div>
                </div>
            `).join('');

            // Recent List
            document.getElementById('recentList').innerHTML = db.txs.slice(0, 5).map(t => `
                <div class="p-5 flex justify-between items-center group hover:bg-slate-50/50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-all">
                            <i data-lucide="activity" class="w-4 h-4"></i>
                        </div>
                        <div>
                            <p class="text-sm font-black text-slate-800">${t.product}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${t.date} · 數量: ${t.qty}</p>
                        </div>
                    </div>
                    <p class="font-black text-slate-900 text-sm">$${t.total.toLocaleString()}</p>
                </div>
            `).join('') || '<div class="p-16 text-center text-slate-300 text-[11px] font-black uppercase tracking-widest">目前無交易紀錄</div>';

            // History Accordion
            const groups = {};
            db.txs.forEach(t => {
                if(!groups[t.date]) groups[t.date] = { items: [], total: 0 };
                groups[t.date].items.push(t);
                groups[t.date].total += t.total;
            });

            document.getElementById('historyAccordion').innerHTML = Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date => `
                <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm group">
                    <button onclick="this.parentElement.classList.toggle('accordion-open')" class="w-full flex justify-between items-center p-5 hover:bg-slate-50 transition-colors">
                        <div class="text-left flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-blue-50 flex flex-col items-center justify-center">
                                <span class="text-[9px] font-black text-blue-600 uppercase">${date.split('-')[1]}月</span>
                                <span class="text-sm font-black text-blue-800">${date.split('-')[2]}</span>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${date === selectedDate ? '當日選定' : '歷史交易'}</p>
                                <p class="text-sm font-black text-slate-800">$${groups[date].total.toFixed(2)}</p>
                            </div>
                        </div>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-slate-300 transition-transform"></i>
                    </button>
                    <div class="hidden group-[.accordion-open]:block bg-slate-50/50 p-4 space-y-2 border-t border-slate-50">
                        ${groups[date].items.map(t => `
                            <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm border border-slate-100/50">
                                <div class="flex items-center gap-4">
                                    <button onclick="deleteTx('${t.id}')" class="w-8 h-8 rounded-lg bg-red-50 text-red-200 hover:text-red-500 hover:bg-red-100 transition-all flex items-center justify-center">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                    <div>
                                        <p class="text-xs font-black text-slate-800">${t.product}</p>
                                        <p class="text-[10px] text-slate-400 font-bold">$${t.price} x ${t.qty}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-sm font-black text-slate-900">$${t.total.toFixed(2)}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('') || '<div class="text-center p-20 text-slate-300 font-bold text-xs uppercase">暫無歷史數據</div>';

            // Config List
            document.getElementById('prodManagementList').innerHTML = Object.keys(db.prods).map(k => `
                <div onclick="openProdModal('${k}')" class="p-6 bg-slate-50 border border-slate-100 rounded-2xl flex justify-between items-center cursor-pointer hover:border-blue-400 hover:bg-white transition-all group">
                    <div>
                        <p class="text-sm font-black text-slate-800 mb-1 group-hover:text-blue-600">${db.prods[k].name}</p>
                        <div class="flex gap-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">售價: <span class="text-slate-700">$${db.prods[k].price}</span></span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase">庫存: <span class="${db.prods[k].stock < 5 ? 'text-red-500' : 'text-slate-700'}">${db.prods[k].stock}</span></span>
                        </div>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-slate-300 group-hover:text-blue-500 transition-all">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function deleteTx(id) {
            const idx = db.txs.findIndex(t => t.id === id);
            if(idx > -1 && confirm("確定刪除此交易？")) {
                const t = db.txs[idx];
                if(db.prods[t.productKey]) db.prods[t.productKey].stock += t.qty;
                db.txs.splice(idx, 1);
                db.queue.push({ id, type: 'DELETE' });
                saveDB();
                render();
            }
        }

        function openProdModal(key = null) {
            const m = document.getElementById('prodModal');
            m.classList.remove('hidden');
            m.classList.add('flex');
            if(key) {
                document.getElementById('modalTitle').textContent = "編輯產品定義";
                document.getElementById('editProdKey').value = key;
                document.getElementById('editProdName').value = db.prods[key].name;
                document.getElementById('editProdPrice').value = db.prods[key].price;
                document.getElementById('editProdCost').value = db.prods[key].cost;
                document.getElementById('editProdStock').value = db.prods[key].stock;
            } else {
                document.getElementById('modalTitle').textContent = "新增產品定義";
                document.getElementById('prodForm').reset();
                document.getElementById('editProdKey').value = "";
            }
        }

        function closeProdModal() {
            document.getElementById('prodModal').classList.add('hidden');
            document.getElementById('prodModal').classList.remove('flex');
        }

        document.getElementById('prodForm').onsubmit = (e) => {
            e.preventDefault();
            const key = document.getElementById('editProdKey').value || "P" + Date.now();
            db.prods[key] = {
                name: document.getElementById('editProdName').value,
                price: parseFloat(document.getElementById('editProdPrice').value),
                cost: parseFloat(document.getElementById('editProdCost').value),
                stock: parseInt(document.getElementById('editProdStock').value)
            };
            db.queue.push({ type: 'CONFIG_PROD', key, data: db.prods[key] });
            saveDB();
            updateProdSelect();
            closeProdModal();
            render();
        };

        async function autoSync() {
            if (isSyncing || db.queue.length === 0 || !navigator.onLine) {
                updateStatusUI(navigator.onLine ? (db.queue.length > 0 ? 'pending' : 'online') : 'offline');
                return;
            }
            isSyncing = true;
            updateStatusUI('syncing');
            const item = db.queue[0];
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
                db.queue.shift();
                saveDB();
                isSyncing = false;
                autoSync();
            } catch (e) {
                isSyncing = false;
                updateStatusUI('pending');
            }
        }

        function updateStatusUI(status) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('syncText');
            const map = {
                online: { color: 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]', text: '系統同步正常' },
                syncing: { color: 'bg-blue-500 animate-pulse', text: '數據同步中' },
                pending: { color: 'bg-orange-500', text: `待上傳 ${db.queue.length} 筆` },
                offline: { color: 'bg-red-500', text: '目前為離線模式' }
            };
            dot.className = `w-2 h-2 rounded-full ${map[status].color}`;
            txt.textContent = map[status].text;
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-slate-400'));
            document.getElementById(`tab-${id}`).classList.add('tab-active');
            render();
        }

        function saveConfig() {
            db.budget = document.getElementById('initialBudget').value;
            saveDB();
            render();
        }

        init();
    </script>
</body>
</html>
