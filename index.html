<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營運管家 PRO | BizManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-v5 {
            width: 100%; background: #F1F5F9; border: 2px solid transparent;
            border-radius: 1.25rem; font-weight: 800; height: 3.5rem;
            padding: 0 1.25rem; font-size: 0.875rem; transition: all 0.2s ease;
        }
        .input-v5:focus {
            background: white; border-color: #6366f1;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.1); outline: none;
        }
        .tab-active { background: white; color: #6366f1; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* 動畫效果 */
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .syncing-dot { animation: pulse-soft 2s infinite; }

        /* 摺疊動畫 */
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .collapsible-content.expanded {
            max-height: 2000px;
            transition: max-height 0.5s ease-in;
        }
        .rotate-icon {
            transition: transform 0.3s ease;
        }
        .rotate-icon.active {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-32">

    <!-- 導航欄 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg">
                    <i data-lucide="bar-chart-3" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-tight text-slate-800 uppercase">營運管家 PRO</h1>
                    <div class="flex items-center gap-1.5">
                        <span id="sync-dot" class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                        <span id="sync-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">雲端已同步</span>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">累積淨值</span>
                <span id="total-net" class="text-xl font-black text-indigo-600">$0</span>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 space-y-6">
        <!-- 數據概覽 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="stats-container"></div>

        <!-- 分頁控制 -->
        <div class="flex bg-slate-200/50 p-1.5 rounded-2xl border border-white">
            <button onclick="switchTab('input')" id="btn-input" class="tab-active flex-1 py-3.5 text-[11px] font-black rounded-[1.25rem] transition-all text-slate-400">數據錄入</button>
            <button onclick="switchTab('history')" id="btn-history" class="flex-1 py-3.5 text-[11px] font-black rounded-[1.25rem] transition-all text-slate-400">歷史帳目</button>
            <button onclick="switchTab('config')" id="btn-config" class="flex-1 py-3.5 text-[11px] font-black rounded-[1.25rem] transition-all text-slate-400">系統設定</button>
        </div>

        <!-- 錄入頁面 -->
        <div id="tab-input" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 bg-white p-6 md:p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-8 flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4 text-indigo-500"></i> 建立新交易
                    </h3>
                    <form id="tx-form" class="space-y-5">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1 italic">日期</label>
                                <input type="date" id="fd-date" class="input-v5" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1 italic">產品</label>
                                <select id="fd-prod" class="input-v5" onchange="autoFillPrice()" required></select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1 italic">單價</label>
                                <input type="number" id="fd-price" step="0.01" class="input-v5" placeholder="0.00" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1 italic">數量</label>
                                <input type="number" id="fd-qty" class="input-v5" value="1" required>
                            </div>
                        </div>
                        <button type="submit" class="w-full py-5 bg-slate-900 text-white rounded-[1.5rem] font-black shadow-2xl hover:bg-indigo-600 transition-all flex items-center justify-center gap-3 group">
                            確認提交 <i data-lucide="send" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </form>
                </div>
                <!-- 庫存列表 -->
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 italic">庫存監控</h3>
                    <div id="stock-list" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
                </div>
            </div>
        </div>

        <!-- 歷史帳目頁面 -->
        <div id="tab-history" class="hidden space-y-4">
            <div id="history-groups" class="space-y-6"></div>
        </div>

        <!-- 系統設定頁面 -->
        <div id="tab-config" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-sm font-black text-slate-800 uppercase italic">產品設定</h3>
                    <button onclick="toggleModal(true)" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase shadow-lg">新增產品</button>
                </div>
                <div id="config-list" class="space-y-4"></div>
            </div>
            
            <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white space-y-4 shadow-xl shadow-indigo-200">
                <h3 class="text-xs font-black uppercase tracking-widest flex items-center gap-2 opacity-80"><i data-lucide="settings" class="w-4 h-4"></i> 固定營運預算</h3>
                <input type="number" id="config-budget" class="bg-transparent border-none text-5xl font-black focus:ring-0 p-0 w-full" placeholder="0.00">
            </div>
        </div>
    </div>

    <!-- 極速同步彈窗 -->
    <div id="sync-popup" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-sm">
        <div class="bg-slate-900/90 backdrop-blur-xl text-white px-6 py-5 rounded-[2rem] shadow-2xl flex items-center justify-between border border-white/10">
            <div class="flex items-center gap-4">
                <i data-lucide="zap" class="text-amber-400 w-5 h-5 fill-amber-400 animate-pulse"></i>
                <div>
                    <p class="text-[11px] font-black tracking-widest uppercase italic">雲端同步中...</p>
                    <p id="sync-status-detail" class="text-[9px] font-bold text-slate-400">正在處理變更隊列</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增產品彈窗 -->
    <div id="prod-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-8 space-y-8 relative">
            <button onclick="toggleModal(false)" class="absolute top-8 right-8 text-slate-300 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            <div class="text-center">
                <h2 class="text-2xl font-black text-slate-800 italic uppercase">New Product</h2>
            </div>
            <form id="new-prod-form" class="space-y-4">
                <input id="np-key" placeholder="產品 ID (如 P1)" class="input-v5" required>
                <input id="np-name" placeholder="產品名稱" class="input-v5" required>
                <input id="np-price" type="number" step="0.1" placeholder="預設售價" class="input-v5" required>
                <input id="np-cost" type="number" step="0.1" placeholder="成本" class="input-v5" required>
                <input id="np-stock" type="number" placeholder="初始庫存" class="input-v5" required>
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl">建立品項</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwqAwQj-2MHcMFImO6IbSC7NGL_TEmsSfGoEHj-SvPNsUX-SnirFihFFywRSnOoxBD8ng/exec';

        let db = JSON.parse(localStorage.getItem('biz_v5_db')) || {
            prods: {
                "P1": { name: "磁懸浮藝術品", price: 360, cost: 240, stock: 10 },
                "P2": { name: "設計帆布袋", price: 30, cost: 14, stock: 50 }
            },
            txs: [],
            queue: [],
            budget: "3000"
        };

        let collapsedDates = {};
        let syncing = false;

        function saveDb() {
            localStorage.setItem('biz_v5_db', JSON.stringify(db));
            render();
        }

        function render() {
            const totalRev = db.txs.reduce((s, t) => s + t.total, 0);
            const totalProfit = db.txs.reduce((s, t) => s + t.profit, 0);
            const net = totalRev - parseFloat(db.budget || 0);
            
            document.getElementById('total-net').innerText = `$${net.toLocaleString(undefined, {minimumFractionDigits:1})}`;
            
            const statsHtml = `
                ${StatCard('本期總收', `$${totalRev.toLocaleString()}`, 'dollar-sign', 'blue')}
                ${StatCard('預計利潤', `$${totalProfit.toLocaleString()}`, 'trending-up', 'emerald')}
                ${StatCard('基礎預算', `$${parseFloat(db.budget).toLocaleString()}`, 'settings', 'slate')}
                ${StatCard('待同步', db.queue.length, 'zap', db.queue.length > 0 ? 'amber' : 'emerald')}
            `;
            document.getElementById('stats-container').innerHTML = statsHtml;

            const syncDot = document.getElementById('sync-dot');
            const syncText = document.getElementById('sync-text');
            if (db.queue.length > 0) {
                syncDot.className = 'w-1.5 h-1.5 rounded-full bg-amber-500 syncing-dot';
                syncText.innerText = `準備同步 (${db.queue.length})`;
            } else {
                syncDot.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500';
                syncText.innerText = '雲端已同步';
            }

            const prodSelect = document.getElementById('fd-prod');
            const currentVal = prodSelect.value;
            prodSelect.innerHTML = '<option value="">請選擇...</option>' + 
                Object.keys(db.prods).map(k => `<option value="${k}">${db.prods[k].name}</option>`).join('');
            prodSelect.value = currentVal;

            document.getElementById('stock-list').innerHTML = Object.keys(db.prods).map(k => `
                <div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center border border-transparent hover:border-slate-200">
                    <div class="min-w-0">
                        <p class="text-[9px] font-black text-indigo-500 uppercase">${k}</p>
                        <p class="text-xs font-bold text-slate-700 truncate">${db.prods[k].name}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-black text-slate-400 uppercase">在庫</p>
                        <p class="text-lg font-black ${db.prods[k].stock <= 5 ? 'text-rose-500' : 'text-slate-900'}">${db.prods[k].stock}</p>
                    </div>
                </div>
            `).join('');

            renderHistoryGroups();

            document.getElementById('config-list').innerHTML = Object.keys(db.prods).map(k => `
                <div class="p-4 bg-slate-50 rounded-2xl flex items-center gap-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center font-black text-xs text-indigo-500">${k}</div>
                    <div class="flex-1 grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div>
                            <label class="text-[8px] font-black text-slate-400 uppercase">產品名稱</label>
                            <input onchange="updateProd('${k}', 'name', this.value)" value="${db.prods[k].name}" class="bg-transparent font-black w-full text-sm outline-none">
                        </div>
                        <div>
                            <label class="text-[8px] font-black text-slate-400 uppercase">售價</label>
                            <input type="number" onchange="updateProd('${k}', 'price', this.value)" value="${db.prods[k].price}" class="bg-transparent font-black w-full text-sm outline-none">
                        </div>
                        <div>
                            <label class="text-[8px] font-black text-slate-400 uppercase">成本</label>
                            <input type="number" onchange="updateProd('${k}', 'cost', this.value)" value="${db.prods[k].cost}" class="bg-transparent font-black w-full text-sm outline-none">
                        </div>
                        <div>
                            <label class="text-[8px] font-black text-slate-400 uppercase">庫存</label>
                            <input type="number" onchange="updateProd('${k}', 'stock', this.value)" value="${db.prods[k].stock}" class="bg-transparent font-black w-full text-sm outline-none text-indigo-600">
                        </div>
                    </div>
                    <button onclick="removeProd('${k}')" class="text-slate-300 hover:text-rose-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function renderHistoryGroups() {
            const container = document.getElementById('history-groups');
            if (db.txs.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-30 font-black italic uppercase tracking-widest text-sm">No Records Found</div>`;
                return;
            }
            const groups = db.txs.reduce((acc, tx) => {
                if (!acc[tx.date]) acc[tx.date] = [];
                acc[tx.date].push(tx);
                return acc;
            }, {});
            const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));
            container.innerHTML = sortedDates.map(date => {
                const dayTxs = groups[date];
                const dayTotal = dayTxs.reduce((s, t) => s + t.total, 0);
                const isCollapsed = collapsedDates[date];
                return `
                    <div class="space-y-3">
                        <div onclick="toggleDateGroup('${date}')" class="flex justify-between items-center px-2 cursor-pointer group">
                            <div class="flex items-center gap-3">
                                <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 rotate-icon ${isCollapsed ? '' : 'active'}"></i>
                                <h4 class="text-xs font-black text-slate-800 uppercase tracking-widest italic">${date}</h4>
                                <span class="bg-indigo-100 text-indigo-600 text-[9px] px-2 py-0.5 rounded-full font-black">${dayTxs.length} 筆</span>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">單日總收</p>
                                <p class="text-xs font-black text-slate-600">$${dayTotal.toLocaleString()}</p>
                            </div>
                        </div>
                        <div id="group-${date}" class="collapsible-content ${isCollapsed ? '' : 'expanded'} space-y-3">
                            ${dayTxs.map(t => `
                                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between mx-1">
                                    <div class="flex items-center gap-4">
                                        <button onclick="deleteTx('${t.id}')" class="text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                        <div>
                                            <p class="text-sm font-black text-slate-800">${t.product}</p>
                                            <p class="text-[10px] font-bold text-slate-400">${t.qty}件 @ $${t.price}</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-sm font-black text-slate-900">$${t.total.toLocaleString()}</p>
                                        <p class="text-[9px] font-bold text-emerald-500 uppercase">利潤 +$${t.profit.toFixed(1)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleDateGroup(date) {
            collapsedDates[date] = !collapsedDates[date];
            render();
        }

        function StatCard(label, value, icon, color) {
            const colors = { blue: 'bg-blue-50 text-blue-600', emerald: 'bg-emerald-50 text-emerald-600', slate: 'bg-slate-50 text-slate-600', amber: 'bg-amber-50 text-amber-600' };
            return `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-between min-h-[100px]">
                    <div class="w-8 h-8 ${colors[color]} rounded-xl flex items-center justify-center mb-auto"><i data-lucide="${icon}" class="w-4 h-4"></i></div>
                    <div>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter mb-0.5">${label}</p>
                        <p class="text-sm font-black text-slate-800 truncate">${value}</p>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            ['input', 'history', 'config'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`btn-${t}`).classList.toggle('tab-active', t === tab);
                document.getElementById(`btn-${t}`).classList.toggle('text-slate-400', t !== tab);
            });
        }

        function toggleModal(show) {
            document.getElementById('prod-modal').classList.toggle('hidden', !show);
        }

        function autoFillPrice() {
            const key = document.getElementById('fd-prod').value;
            if (key && db.prods[key]) {
                document.getElementById('fd-price').value = db.prods[key].price;
            }
        }

        // 修改後的同步邏輯：批次且立即處理
        async function autoSync() {
            if (db.queue.length === 0 || syncing || !navigator.onLine) return;
            
            syncing = true;
            const popup = document.getElementById('sync-popup');
            const detail = document.getElementById('sync-status-detail');
            popup.classList.remove('hidden');
            
            const batchToSync = [...db.queue];
            const batchSize = batchToSync.length;
            detail.innerText = `正在更新雲端 (${batchSize} 筆變更)...`;

            try {
                // 使用 Promise.all 同時發送請求以加速
                const syncPromises = batchToSync.map(item => 
                    fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        cache: 'no-cache',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(item)
                    })
                );

                await Promise.all(syncPromises);

                // 同步成功後移除對應項目
                const batchIds = batchToSync.map(b => b.id || b.timestamp);
                db.queue = db.queue.filter(q => !batchIds.includes(q.id || q.timestamp));
                saveDb();
                
            } catch (e) {
                console.error("同步失敗:", e);
                detail.innerText = "連線不穩，稍後重試...";
            } finally {
                syncing = false;
                if (db.queue.length === 0) {
                    setTimeout(() => popup.classList.add('hidden'), 1000);
                } else {
                    setTimeout(autoSync, 1000);
                }
            }
        }

        document.getElementById('tx-form').onsubmit = (e) => {
            e.preventDefault();
            const key = document.getElementById('fd-prod').value;
            const price = parseFloat(document.getElementById('fd-price').value);
            const qty = parseInt(document.getElementById('fd-qty').value);
            const prod = db.prods[key];

            const newTx = {
                id: "T" + Date.now(),
                date: document.getElementById('fd-date').value,
                product: prod.name,
                productKey: key,
                qty: qty,
                quantity: qty,
                price: price,
                total: price * qty,
                profit: (price - prod.cost) * qty,
                action: 'ADD', // 這裡是新增動作
                status: '已入帳',
                timestamp: new Date().toISOString()
            };

            db.txs.unshift(newTx);
            db.queue.push(newTx);
            db.prods[key].stock -= qty;
            saveDb();
            
            e.target.reset();
            document.getElementById('fd-date').value = new Date().toISOString().split('T')[0];
            autoSync();
        };

        function deleteTx(id) {
            const idx = db.txs.findIndex(t => t.id === id);
            if (idx === -1) return;
            const tx = db.txs[idx];
            if (!confirm("確定刪除此交易？雲端狀態將更新為「刪除」。")) return;

            // 重要：發送 action: 'DEL' 並指定 status 為 '刪除'
            // GAS 端收到後應搜尋對應 id 的列，並將狀態欄位更新
            db.queue.push({
                id: tx.id,
                date: tx.date,
                action: 'DEL',
                status: '刪除', // 目標狀態
                product: tx.product,
                timestamp: new Date().toISOString()
            });

            if(db.prods[tx.productKey]) db.prods[tx.productKey].stock += tx.qty;
            db.txs.splice(idx, 1);
            saveDb();
            autoSync();
        }

        function updateProd(key, field, val) {
            db.prods[key][field] = (field === 'name') ? val : parseFloat(val);
            saveDb();
        }

        function removeProd(key) {
            if(!confirm(`確定移除 ${db.prods[key].name}？`)) return;
            delete db.prods[key];
            saveDb();
        }

        document.getElementById('new-prod-form').onsubmit = (e) => {
            e.preventDefault();
            const k = document.getElementById('np-key').value;
            db.prods[k] = {
                name: document.getElementById('np-name').value,
                price: parseFloat(document.getElementById('np-price').value),
                cost: parseFloat(document.getElementById('np-cost').value),
                stock: parseInt(document.getElementById('np-stock').value)
            };
            saveDb();
            toggleModal(false);
            e.target.reset();
        };

        document.getElementById('config-budget').onchange = (e) => {
            db.budget = e.target.value;
            saveDb();
        };

        window.addEventListener('online', autoSync);

        window.onload = () => {
            document.getElementById('fd-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('config-budget').value = db.budget;
            render();
            // 每分鐘保險同步一次
            setInterval(autoSync, 60000);
        };
    </script>
</body>
</html>
