<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易管理系統 - 庫存售價同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }
        .chart-grid {
            background-image: linear-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 100% 40px;
        }
        .bar-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bar-transition:hover {
            filter: brightness(1.1);
            transform: scaleX(1.05);
        }
        .tab-active { @apply bg-white text-blue-600 shadow-md; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased p-3 md:p-6 pb-20 md:pb-6">
    <div class="max-w-7xl mx-auto">
        
        <!-- 頂部導覽 -->
        <header class="flex flex-col lg:flex-row justify-between items-stretch lg:items-center mb-8 gap-4">
            <div class="px-2">
                <h1 class="text-2xl md:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    營運管理控制台
                    <span class="text-xs font-normal bg-green-100 text-green-600 px-2 py-1 rounded-full text-nowrap">數據自動連動中</span>
                </h1>
                <nav class="flex p-1 bg-slate-200/50 rounded-xl w-fit mt-4">
                    <button onclick="switchTab('management')" id="tab-management" class="px-6 py-2 text-sm font-bold rounded-lg transition-all tab-active">交易管理</button>
                    <button onclick="switchTab('reports')" id="tab-reports" class="px-6 py-2 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-700">數據報表</button>
                </nav>
            </div>
            
            <div class="glass-card px-6 py-4 rounded-2xl border-l-4 border-blue-500 flex flex-row items-center justify-between gap-10">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">總預算成本 (HKD)</p>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-400 font-bold">$</span>
                        <input type="number" id="initialBudget" step="0.01" class="bg-transparent text-2xl font-black text-slate-800 outline-none w-32 focus:ring-1 focus:ring-blue-100 rounded" value="3962.74" onchange="render()">
                    </div>
                </div>
                <div class="h-10 w-px bg-slate-100"></div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">目前淨損益</p>
                    <p class="text-2xl font-black" id="netProfitDisplay">$0</p>
                </div>
            </div>
        </header>

        <!-- [分頁 1: 交易管理] -->
        <div id="page-management" class="tab-content animate-in fade-in duration-500">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="glass-card p-5 rounded-2xl border-b-4 border-blue-500">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">總營業額</p>
                        <i data-lucide="trending-up" class="w-4 h-4 text-blue-500"></i>
                    </div>
                    <p class="text-2xl font-black text-slate-800" id="totalRevenue">$0</p>
                </div>
                <div class="glass-card p-5 rounded-2xl border-b-4 border-slate-400">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">已售商品成本</p>
                        <i data-lucide="shopping-cart" class="w-4 h-4 text-slate-400"></i>
                    </div>
                    <p class="text-2xl font-black text-slate-800" id="totalCost">$0</p>
                </div>
                <div class="glass-card p-5 rounded-2xl border-b-4 border-emerald-500">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">累積毛利</p>
                        <i data-lucide="coins" class="w-4 h-4 text-emerald-500"></i>
                    </div>
                    <p class="text-2xl font-black text-emerald-600" id="totalProfit">$0</p>
                </div>
                <div class="glass-card p-5 rounded-2xl border-b-4 border-indigo-500 col-span-2 lg:col-span-1">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">庫存概況 (點擊調整)</p>
                        <i data-lucide="box" class="w-4 h-4 text-indigo-500"></i>
                    </div>
                    <div id="stockGrid" class="grid grid-cols-4 gap-1 mt-1"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- 左側：輸入表單 -->
                <aside class="lg:col-span-4">
                    <div class="glass-card p-8 rounded-3xl sticky top-6">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2 border-l-4 border-blue-500 pl-4">建立交易單</h2>
                        <form id="transactionForm" class="space-y-5">
                            <div>
                                <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">選擇產品</label>
                                <select id="productSelect" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm appearance-none cursor-pointer" onchange="autoFillPrices()">
                                    <option value="" disabled selected>請選擇項目...</option>
                                </select>
                            </div>

                            <div id="packageField" class="hidden space-y-3 p-4 bg-blue-50/50 rounded-2xl border border-blue-100 ring-1 ring-blue-200/50">
                                <p class="text-[10px] font-bold text-blue-500 uppercase flex items-center gap-2">
                                    <i data-lucide="package-plus" class="w-3 h-3"></i> Package 組合配置
                                </p>
                                <div id="packageList" class="space-y-2"></div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">成交單價</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-3 text-slate-400 text-xs">$</span>
                                        <input type="number" step="0.01" id="unitPrice" required class="w-full pl-7 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500">
                                    </div>
                                </div>
                                <div>
                                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">預設總成本</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-3 text-emerald-400 text-xs">$</span>
                                        <input type="number" step="0.01" id="totalTransactionCost" required class="w-full pl-7 pr-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl outline-none text-sm font-bold text-emerald-700">
                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">數量</label>
                                    <select id="quantity" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" onchange="autoFillPrices()"></select>
                                </div>
                                <div>
                                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">交易日期</label>
                                    <input type="date" id="date" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                                </div>
                            </div>

                            <button type="submit" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl transition duration-300 flex justify-center items-center gap-2 mt-4 active:scale-95">
                                <i data-lucide="send" class="w-4 h-4"></i> 確認提交交易
                            </button>
                        </form>
                    </div>
                </aside>

                <!-- 右側：歷史紀錄 -->
                <main class="lg:col-span-8">
                    <div class="glass-card rounded-3xl overflow-hidden h-full flex flex-col">
                        <div class="p-6 border-b border-slate-100 bg-white/80 flex justify-between items-center">
                            <h2 class="font-bold text-slate-800">歷史交易清單</h2>
                            <span class="text-[10px] text-slate-400 font-bold uppercase" id="recordCount">0 筆紀錄</span>
                        </div>
                        <div class="overflow-x-auto no-scrollbar flex-grow">
                            <table class="w-full text-left min-w-[600px]">
                                <thead class="bg-slate-50/80 sticky top-0 z-10">
                                    <tr class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                                        <th class="px-8 py-4">日期</th>
                                        <th class="px-6 py-4">項目內容</th>
                                        <th class="px-6 py-4">收支明細</th>
                                        <th class="px-6 py-4 text-right">單筆淨利</th>
                                        <th class="px-8 py-4 text-center">管理</th>
                                    </tr>
                                </thead>
                                <tbody id="recordList" class="divide-y divide-slate-50 text-sm"></tbody>
                            </table>
                            <div id="emptyState" class="py-32 text-center text-slate-300 hidden">
                                <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                                <p>目前尚無交易紀錄</p>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- [分頁 2: 數據報表] -->
        <div id="page-reports" class="tab-content hidden animate-in slide-in-from-bottom-4 duration-500">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass-card p-8 rounded-3xl lg:col-span-2">
                    <div class="flex justify-between items-center mb-10">
                        <h3 class="font-bold flex items-center gap-2 text-lg"><i data-lucide="bar-chart-big" class="text-blue-500"></i> 近期利潤趨勢 (Daily Profit)</h3>
                    </div>
                    <div class="h-72 relative chart-grid pt-10 px-4 flex items-end gap-4" id="profitChartContainer"></div>
                </div>

                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="font-bold mb-8 flex items-center gap-2 text-lg"><i data-lucide="shield-check" class="text-indigo-500"></i> 庫存水位監控</h3>
                    <div id="inventoryReportList" class="space-y-6"></div>
                </div>

                <div class="glass-card p-8 rounded-3xl lg:col-span-3">
                    <h3 class="font-bold mb-8 flex items-center gap-2 text-lg"><i data-lucide="award" class="text-amber-500"></i> 產品利潤貢獻排行</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="productProfitRank"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 編輯彈窗 -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-50 p-6">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl scale-in-center">
            <h3 class="text-xl font-bold mb-1 text-slate-800">產品參數調整</h3>
            <p class="text-xs text-slate-400 mb-8" id="targetProductName"></p>
            <div class="space-y-6 mb-8">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">庫存數量</label>
                    <input type="number" id="editStockCount" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-xl font-black text-center focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">預設售價</label>
                        <input type="number" step="0.01" id="editUnitPrice" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-lg font-bold text-center text-blue-600 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">預設成本</label>
                        <input type="number" step="0.01" id="editUnitCost" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-lg font-bold text-center text-emerald-600 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeEditModal()" class="py-4 font-bold text-slate-400 hover:text-slate-600 transition-colors">取消</button>
                <button onclick="confirmEditChange()" class="py-4 font-bold bg-blue-600 text-white rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-95">更新同步</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心配置 ---
        const DEFAULT_PRODUCT_DB = {
            "P1-磁懸浮": { price: 360, cost: 240.2 },
            "P2-帆布袋": { price: 30, cost: 14.2 },
            "P3-毛巾": { price: 15, cost: 5.66 },
            "P4-鎖匙扣": { price: 15, cost: 5 }
        };

        let productSettings = JSON.parse(localStorage.getItem('product_settings')) || DEFAULT_PRODUCT_DB;
        let stocks = JSON.parse(localStorage.getItem('stocks')) || { "P1-磁懸浮": 10, "P2-帆布袋": 50, "P3-毛巾": 100, "P4-鎖匙扣": 100 };
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let currentEditingKey = null;

        function init() {
            lucide.createIcons();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            const qtySelect = document.getElementById('quantity');
            for(let i=1; i<=50; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = i; qtySelect.appendChild(opt);
            }
            initProductSelect();
            initPackageList();
            render();
        }

        function initProductSelect() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="" disabled selected>請選擇項目...</option>';
            Object.keys(productSettings).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key; opt.textContent = `${key} (剩: ${stocks[key]}, $${productSettings[key].price})`;
                if (stocks[key] <= 0) opt.disabled = true;
                select.appendChild(opt);
            });
            select.innerHTML += `<option value="package" class="text-blue-600 font-bold">📦 Package 組合包</option>`;
            select.innerHTML += `<option value="other">＋ 其他 / 手動紀錄</option>`;
        }

        function initPackageList() {
            const container = document.getElementById('packageList');
            container.innerHTML = Object.keys(productSettings).map(key => `
                <div class="flex items-center justify-between text-xs py-1 border-b border-blue-100/30 last:border-0">
                    <span class="font-medium text-slate-600">${key}</span>
                    <div class="flex items-center bg-white rounded-lg border border-blue-200 overflow-hidden shadow-sm">
                        <button type="button" onclick="stepPkg('${key}', -1)" class="px-3 py-1 hover:bg-slate-50 text-blue-500 font-bold">-</button>
                        <input type="number" data-pkg-key="${key}" value="0" readonly class="pkg-input w-8 text-center font-bold text-blue-700 outline-none bg-transparent">
                        <button type="button" onclick="stepPkg('${key}', 1)" class="px-3 py-1 hover:bg-slate-50 text-blue-500 font-bold">+</button>
                    </div>
                </div>
            `).join('');
        }

        window.stepPkg = (key, step) => {
            const input = document.querySelector(`input[data-pkg-key="${key}"]`);
            const newVal = Math.max(0, Math.min(stocks[key], parseInt(input.value) + step));
            input.value = newVal;
            calculatePackageTotal();
        };

        function calculatePackageTotal() {
            let totalP = 0, totalC = 0;
            document.querySelectorAll('.pkg-input').forEach(input => {
                const key = input.dataset.pkgKey;
                const qty = parseInt(input.value) || 0;
                totalP += productSettings[key].price * qty;
                totalC += productSettings[key].cost * qty;
            });
            document.getElementById('unitPrice').value = totalP.toFixed(2);
            document.getElementById('totalTransactionCost').value = totalC.toFixed(2);
        }

        window.autoFillPrices = () => {
            const productType = document.getElementById('productSelect').value;
            const qty = parseInt(document.getElementById('quantity').value) || 1;
            const pkgField = document.getElementById('packageField');
            
            if (productType === 'package') {
                pkgField.classList.remove('hidden');
                calculatePackageTotal();
            } else if (productSettings[productType]) {
                pkgField.classList.add('hidden');
                document.getElementById('unitPrice').value = productSettings[productType].price;
                document.getElementById('totalTransactionCost').value = (productSettings[productType].cost * qty).toFixed(2);
            } else {
                pkgField.classList.add('hidden');
            }
        };

        // --- 核心邏輯：刪除並恢復庫存 ---
        window.deleteRecord = (id) => {
            const record = transactions.find(t => t.id === id);
            if(!record) return;

            if(confirm(`確認移除這筆金額 $${record.total} 的交易？\n庫存將會自動歸還。`)) {
                // 1. 恢復庫存
                if (record.rawMapping) {
                    // 如果是普通產品或組合包
                    Object.keys(record.rawMapping).forEach(prodKey => {
                        if (stocks[prodKey] !== undefined) {
                            stocks[prodKey] += record.rawMapping[prodKey];
                        }
                    });
                }
                
                // 2. 刪除紀錄
                transactions = transactions.filter(t => t.id !== id);
                saveAndRender();
                initProductSelect();
            }
        };

        // --- 核心邏輯：提交交易 ---
        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const productType = document.getElementById('productSelect').value;
            let finalName = "", rawMapping = {};
            const qty = parseInt(document.getElementById('quantity').value);

            if (productType === 'package') {
                const items = [];
                document.querySelectorAll('.pkg-input').forEach(input => {
                    const q = parseInt(input.value) || 0;
                    if (q > 0) { 
                        items.push(`${input.dataset.pkgKey.split('-')[0]}x${q}`); 
                        rawMapping[input.dataset.pkgKey] = q; 
                    }
                });
                if(items.length === 0) return;
                finalName = "📦 套裝: " + items.join(', ');
            } else if (productType === 'other') {
                finalName = "自定義項目";
            } else {
                finalName = productType; 
                rawMapping[productType] = qty;
            }

            const totalRev = parseFloat(document.getElementById('unitPrice').value) * (productType === 'package' ? 1 : qty);
            const totalCost = parseFloat(document.getElementById('totalTransactionCost').value);

            const record = {
                id: "T-" + Date.now(),
                date: document.getElementById('date').value,
                product: finalName,
                quantity: productType === 'package' ? 1 : qty,
                total: totalRev,
                totalCost: totalCost,
                profit: totalRev - totalCost,
                rawMapping: rawMapping // 儲存庫存扣除詳情以便日後恢復
            };

            Object.keys(rawMapping).forEach(key => stocks[key] -= rawMapping[key]);
            transactions.unshift(record);
            saveAndRender();
            this.reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            initProductSelect(); initPackageList();
        });

        // --- 渲染函數 ---
        function render() {
            renderStocks();
            const list = document.getElementById('recordList');
            const empty = document.getElementById('emptyState');
            list.innerHTML = '';
            
            let tRev = 0, tCost = 0;
            transactions.forEach(item => {
                tRev += item.total; tCost += item.totalCost;
                list.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-8 py-5 text-slate-400 font-bold text-[10px] uppercase tracking-tighter">${item.date}</td>
                        <td class="px-6 py-5 font-bold text-slate-800">${item.product} <span class="ml-1 text-[10px] font-normal text-slate-400">x${item.quantity}</span></td>
                        <td class="px-6 py-5">
                            <div class="text-blue-600 font-bold">$${item.total.toLocaleString()}</div>
                            <div class="text-[10px] text-slate-400 uppercase tracking-widest">成本 $${item.totalCost}</div>
                        </td>
                        <td class="px-6 py-5 text-right font-black ${item.profit >= 0 ? 'text-emerald-500' : 'text-red-500'}">
                            ${item.profit >= 0 ? '+' : ''}$${item.profit.toLocaleString()}
                        </td>
                        <td class="px-8 py-5 text-center">
                            <button onclick="deleteRecord('${item.id}')" class="text-slate-200 hover:text-red-400 transition-colors p-2 rounded-lg hover:bg-red-50">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('recordCount').textContent = `${transactions.length} 筆紀錄`;
            empty.classList.toggle('hidden', transactions.length > 0);
            document.getElementById('totalRevenue').textContent = `$${tRev.toLocaleString()}`;
            document.getElementById('totalCost').textContent = `$${tCost.toLocaleString()}`;
            document.getElementById('totalProfit').textContent = `$${(tRev - tCost).toLocaleString()}`;
            
            const initial = parseFloat(document.getElementById('initialBudget').value) || 0;
            const net = tRev - initial;
            const netEl = document.getElementById('netProfitDisplay');
            netEl.textContent = `${net >= 0 ? '+' : ''}$${net.toLocaleString()}`;
            netEl.className = `text-2xl font-black ${net < 0 ? 'text-red-500' : 'text-emerald-600'}`;
            
            if (!document.getElementById('page-reports').classList.contains('hidden')) renderReports();
            lucide.createIcons();
        }

        function renderStocks() {
            const grid = document.getElementById('stockGrid');
            grid.innerHTML = Object.keys(stocks).map(key => {
                const isLow = stocks[key] < 5;
                const p = productSettings[key];
                return `
                    <button type="button" onclick="openEditModal('${key}')" class="bg-white border ${isLow ? 'border-red-200 bg-red-50' : 'border-slate-100'} p-1 rounded-lg hover:border-blue-300 transition-all flex flex-col items-center">
                        <span class="block text-[6px] text-slate-400 font-bold truncate w-full">${key.split('-')[0]}</span>
                        <span class="block text-[10px] font-black ${isLow ? 'text-red-600' : 'text-slate-700'}">${stocks[key]}</span>
                        <span class="block text-[6px] text-blue-500 font-medium">$${p.price}</span>
                    </button>
                `;
            }).join('');
        }

        window.openEditModal = (key) => {
            currentEditingKey = key;
            document.getElementById('targetProductName').textContent = "正在調整產品： " + key;
            document.getElementById('editStockCount').value = stocks[key];
            document.getElementById('editUnitPrice').value = productSettings[key].price;
            document.getElementById('editUnitCost').value = productSettings[key].cost;
            document.getElementById('editModal').classList.remove('hidden');
        };
        window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');
        window.confirmEditChange = () => {
            stocks[currentEditingKey] = parseInt(document.getElementById('editStockCount').value);
            productSettings[currentEditingKey].price = parseFloat(document.getElementById('editUnitPrice').value);
            productSettings[currentEditingKey].cost = parseFloat(document.getElementById('editUnitCost').value);
            saveAndRender(); 
            closeEditModal(); 
            initProductSelect();
        };

        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`page-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'bg-white', 'text-blue-600', 'shadow-md'));
            document.getElementById(`tab-${tabId}`).classList.add('tab-active', 'bg-white', 'text-blue-600', 'shadow-md');
            if (tabId === 'reports') renderReports();
            lucide.createIcons();
        };

        function renderReports() {
            const chartContainer = document.getElementById('profitChartContainer');
            const daily = {};
            transactions.forEach(t => daily[t.date] = (daily[t.date] || 0) + t.profit);
            const dates = Object.keys(daily).sort().slice(-7);
            const values = dates.map(d => daily[d]);
            const maxVal = Math.max(...values, 500);

            chartContainer.innerHTML = dates.map((d, i) => {
                const h = (daily[d] / maxVal) * 100;
                const isPositive = daily[d] >= 0;
                return `
                    <div class="flex-1 flex flex-col items-center group relative h-full">
                        <div class="absolute -top-6 text-[10px] font-black text-blue-600 opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0">$${Math.round(daily[d])}</div>
                        <div class="w-full max-w-[40px] bg-slate-100/50 rounded-t-xl relative flex items-end h-full overflow-hidden">
                            <div class="w-full bg-gradient-to-t ${isPositive ? 'from-blue-600 to-blue-400' : 'from-red-600 to-red-400'} rounded-t-lg bar-transition" style="height:${Math.max(4, Math.abs(h))}%"></div>
                        </div>
                        <div class="text-[9px] font-bold text-slate-400 mt-4 whitespace-nowrap">${d.split('-').slice(1).join('/')}</div>
                    </div>
                `;
            }).join('');

            const inventory = document.getElementById('inventoryReportList');
            inventory.innerHTML = Object.keys(stocks).map(key => {
                const ratio = Math.min(100, (stocks[key] / 100) * 100);
                return `
                    <div class="space-y-2">
                        <div class="flex justify-between text-[11px] font-bold">
                            <span class="text-slate-700">${key}</span>
                            <span class="${ratio < 20 ? 'text-red-500 animate-pulse' : 'text-slate-400'}">${stocks[key]} pcs</span>
                        </div>
                        <div class="h-2 w-full bg-slate-100 rounded-full">
                            <div class="h-full ${ratio < 20 ? 'bg-red-500' : 'bg-blue-500'} rounded-full transition-all duration-1000" style="width:${ratio}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            const rank = document.getElementById('productProfitRank');
            const analysis = {};
            transactions.forEach(t => {
                const name = t.product.includes('📦') ? '組合套裝' : t.product;
                if(!analysis[name]) analysis[name] = { profit: 0 };
                analysis[name].profit += t.profit;
            });
            const sorted = Object.keys(analysis).sort((a,b) => analysis[b].profit - analysis[a].profit);
            const totalProfit = sorted.reduce((sum, k) => sum + Math.max(0, analysis[k].profit), 0) || 1;

            rank.innerHTML = sorted.map((name, i) => {
                const perc = Math.max(0, (analysis[name].profit / totalProfit) * 100);
                return `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center font-black text-slate-300 text-sm">${i+1}</div>
                            <span class="text-[10px] font-bold px-2 py-1 rounded bg-emerald-50 text-emerald-600">佔比 ${Math.round(perc)}%</span>
                        </div>
                        <p class="text-sm font-bold text-slate-800 truncate mb-1">${name}</p>
                        <p class="text-2xl font-black text-slate-900 mb-4">$${Math.round(analysis[name].profit).toLocaleString()}</p>
                        <div class="h-1.5 w-full bg-slate-50 rounded-full"><div class="h-full bg-blue-500 rounded-full" style="width:${perc}%"></div></div>
                    </div>
                `;
            }).join('');
        }

        function saveAndRender() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
            localStorage.setItem('stocks', JSON.stringify(stocks));
            localStorage.setItem('product_settings', JSON.stringify(productSettings));
            render();
        }

        init();
    </script>
</body>
</html>
